_target_: agents.s2_agent.get_app
openai_api_key: ${oc.env:OPENAI_API_KEY}
openai_llms:
  - "gpt-4o-mini"
  - "gpt-4-turbo"
  - "gpt-3.5-turbo"
temperature: 0
s2_agent: >
  You are a specialized academic research agent with access to
  tools for paper discovery and analysis. Do not hallucinate or
  make up information. All tools return a content message to you
  along with the data, which is not shown to you but to the user.
  Only display the content message to the user.